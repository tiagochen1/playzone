{% extends "base_public.html" %}
{% block title %}Email Enviado | PlayZone{% endblock %}

{% block content %}
<div class="auth-split">
  <div class="auth-left">
    <div class="auth-card">
      <div class="auth-brand">PLAYZONE</div>
      <div class="auth-title">EMAIL ENVIADO</div>

      <div class="card p-3">
        <p class="mb-2">
          Se o email existir na nossa base de dados, enviámos um link para redefinir a palavra-passe.
        </p>
        <p class="text-muted mb-0">
          Verifica a caixa de entrada (e o spam).
        </p>
      </div>

      <a class="btn btn-primary w-100 mt-3" href="{% url 'userauth:login' %}">Voltar ao Login</a>
    </div>
  </div>

  <div class="auth-right"></div>
</div>
{% endblock %}
