{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Email enviado | PlayZone</title>

    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<div class="login-layout">

    <div class="login-left">

        <h2 class="login-brand">PLAYZONE</h2>
        <h1 class="login-title">Email enviado</h1>

        <p style="max-width: 420px; color: #555;">
            Se existir uma conta associada ao email indicado,
            vais receber uma mensagem com instruções para redefinir a tua senha.
        </p>

        <div class="login-actions" style="margin-top: 30px;">
            <a href="{% url 'userauth:login' %}" class="btn btn-dark">
                Voltar ao Login
            </a>
        </div>

    </div>

    <div class="login-right"></div>

</div>

</body>
</html>
