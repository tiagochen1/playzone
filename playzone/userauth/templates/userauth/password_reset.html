{% extends "base_public.html" %}
{% block title %}Recuperar Senha | PlayZone{% endblock %}

{% block content %}
<div class="auth-split">
  <div class="auth-left">
    <div class="auth-card">
      <div class="auth-brand">PLAYZONE</div>
      <div class="auth-title">RECUPERAR SENHA</div>

      <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}

        <div class="mb-3">
          <label class="form-label">Email</label>
          {{ form.email }}
        </div>

        <button class="btn btn-primary w-100">RECUPERAR SENHA</button>
        <a class="btn btn-outline-primary w-100 mt-2" href="{% url 'userauth:login' %}">Voltar</a>
      </form>
    </div>
  </div>

  <div class="auth-right"></div>
</div>
{% endblock %}
