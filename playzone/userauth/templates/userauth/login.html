{% extends "base_public.html" %}
{% block title %}Login | PlayZone{% endblock %}

{% block content %}
<div class="auth-split">
  <div class="auth-left">
    <div class="auth-card">
      <div class="auth-brand">PLAYZONE</div>
      <div class="auth-title">LOGIN</div>

      <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}

        <div class="mb-3">
          <label class="form-label">Email</label>
          {{ form.username }}
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          {{ form.password }}
        </div>

        <button class="btn btn-primary w-100" type="submit">LOGIN</button>
        <a class="btn btn-outline-primary w-100 mt-2" href="{% url 'userauth:register' %}">REGISTAR</a>

        <div class="auth-link-row">
          <a href="{% url 'userauth:password_reset' %}">RECUPERAR SENHA</a>
        </div>
      </form>
    </div>
  </div>

  <div class="auth-right"></div>
</div>
{% endblock %}
