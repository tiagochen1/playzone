{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login | PlayZone</title>

    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<div class="login-layout">

    <!-- LADO ESQUERDO -->
    <div class="login-left">

        <h2 class="login-brand">PLAYZONE</h2>
        <h1 class="login-title">Sign In to PLAYZONE</h1>

        <form method="post" class="login-form">
            {% csrf_token %}

            {{ form.non_field_errors }}

            <input type="text"
                   name="username"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <div class="login-actions">
                <button type="submit" class="btn btn-dark">
                    Login
                </button>

                <a href="{% url 'userauth:register' %}" class="btn btn-light">
                    Registar
                </a>
            </div>
        </form>

    </div>

    <!-- LADO DIREITO -->
    <div class="login-right">
        <a href="{% url 'userauth:password_reset' %}" class="recover-btn">
            RECUPERAR SENHA
        </a>
    </div>

</div>

</body>
</html>
