{% extends "base_public.html" %}
{% block title %}Login | PlayZone{% endblock %}

{% block content %}
<div class="auth-topbar">LOGIN</div>

<div class="auth-split">
  <div class="auth-left">
    <div class="auth-brand">PLAYZONE</div>
    <div class="auth-title">Sign In to PLAYZONE</div>

    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:16px;">
        {{ form.username }}
      </div>
      <div style="margin-bottom:16px;">
        {{ form.password }}
      </div>

      <div class="auth-actions">
        <button class="btn-auth-dark" type="submit">Login</button>
        <a class="btn-auth-light" href="{% url 'userauth:register' %}">Registar</a>
      </div>
    </form>

    <a href="{% url 'userauth:password_reset' %}" style="display:inline-block;margin-top:16px;">
      RECUPERAR SENHA
    </a>
  </div>

  <div class="auth-right"></div>
</div>
{% endblock %}
