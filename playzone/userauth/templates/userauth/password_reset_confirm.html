{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha | PlayZone</title>

    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body>

<div class="login-layout">

    <div class="login-left">

        <h2 class="login-brand">PLAYZONE</h2>
        <h1 class="login-title">Nova Senha</h1>

        {% if validlink %}
            <form method="post" class="login-form">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <input
                    type="password"
                    name="new_password1"
                    placeholder="Nova senha"
                    required
                >

                <input
                    type="password"
                    name="new_password2"
                    placeholder="Confirmar nova senha"
                    required
                >

                <div class="login-actions">
                    <button type="submit" class="btn btn-dark">
                        Alterar senha
                    </button>
                </div>
            </form>
        {% else %}
            <p style="color:#c00;">
                Este link é inválido ou já foi utilizado.
            </p>

            <div class="login-actions" style="margin-top: 20px;">
                <a href="{% url 'userauth:password_reset' %}" class="btn btn-dark">
                    Pedir novo link
                </a>
            </div>
        {% endif %}

    </div>

    <div class="login-right"></div>

</div>

</body>
</html>
