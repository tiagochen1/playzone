{% load static %}
<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin | PlayZone{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="pz-shell">
  <aside class="pz-sidebar">
    <div>
      <div class="pz-brand">PLAYZONE</div>
      <nav class="pz-nav">
        <a class="pz-nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}" href="{% url 'campos:admin_dashboard' %}">📊 DashBoard</a>
        <a class="pz-nav-link" href="{% url 'campos:admin_campos_list' %}">⚙️ Customs</a>
      </nav>
    </div>

    <div class="pz-user">
      <div class="pz-avatar">{{ request.user.username|first|upper }}</div>
      <div>
        <div class="small text-muted">Hello,</div>
        <div class="fw-semibold">Admin!</div>
        <div class="mt-2">
          <a class="link-secondary small" href="{% url 'userauth:logout' %}">Sair</a>
        </div>
      </div>
    </div>
  </aside>

  <main class="pz-content">
    {% include 'partials/messages.html' %}
    {% block content %}{% endblock %}
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
