<aside class="sidebar">
  <div>
    <h2>PLAYZONE</h2>

    <nav>
      <ul>
        <li>
          <a href="{% url 'campos:campos_list' %}">Lista de Campos</a>
        </li>
        <li>
          <a href="{% url 'campos:minhas_reservas' %}">Minhas Reservas</a>
        </li>
        <li>
          <a href="{% url 'campos:historico' %}">Histórico</a>
        </li>
        {% if request.user.is_staff %}
        <li>
          <a href="{% url 'campos:admin_dashboard' %}">Admin Dashboard</a>
        </li>
        {% endif %}
      </ul>
    </nav>
  </div>

  <div class="user-area">
    <a class="user-profile-link" href="{% url 'userauth:profile' %}" title="Ver perfil">
      <div class="user-circle">{{ request.user.username|first|upper }}</div>
      <div>
        <div>Hello, {{ request.user.username }}!</div>
      </div>
    </a>
    <a class="logout-link" href="{% url 'userauth:logout' %}">Sair</a>
  </div>
</aside>
